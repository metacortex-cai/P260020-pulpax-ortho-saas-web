<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulpax – Tedavi Planı Editörü</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6fa;color:#2c3e50;font-size:13px}
.editor-wrap{max-width:1100px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;border:1px solid #e0e4ea;margin-bottom:12px}
.card-header{padding:10px 16px;border-bottom:1px solid #e0e4ea;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-body{padding:14px 16px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:500;transition:all .12s}
.btn-default{background:#f1f3f7;border-color:#d0d5e0;color:#444}
.btn-default:hover{background:#e4e8f0}
.btn-success{background:#00b19d;border-color:#00b19d;color:#fff}
.btn-success:hover{background:#009885}
.btn-outline-success{background:#fff;border-color:#00b19d;color:#00b19d}
.btn-danger{background:#ef5350;border-color:#ef5350;color:#fff}
.btn-sm{padding:3px 10px;font-size:11px}
.btn-group{display:inline-flex;gap:4px}
/* Tooth schema */
.teeth-wrapper-col{padding:0}
.teeth-roots{text-align:center;white-space:nowrap}
.teeth-roots-top>.teeth-single-wrapper{background:linear-gradient(to bottom,#f4e3e4 47%,#ffffff 47%)}
.teeth-roots-bottom>.teeth-single-wrapper{background:linear-gradient(to bottom,#ffffff 47%,#f4e3e4 47%)}
.teeth-single-wrapper{display:inline-block;text-align:center;min-width:44px;max-width:44px;position:relative;border-radius:0}
.teeth-single-wrapper:first-child{border-radius:8px 0 0 8px}
.teeth-single-wrapper:last-child{border-radius:0 8px 8px 0}
.teeth-def{height:72px;cursor:pointer;padding:3px}
.teeth-def img{height:100%}
.teeth-def:hover img{transform:scale(1.08);transition:transform .1s}
.teeth-top{width:44px;padding:3px}
.teeth-top img{width:100%}
.tooth-num{font-size:10px;color:#95a0b0;font-weight:500;line-height:1.5}
.jaw-label{text-align:center;font-size:10px;color:#95a0b0;font-weight:600;letter-spacing:.8px;padding:2px 0}
.child-row{margin:3px 0}
/* Toolbar */
.proc-toolbar{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.proc-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:2px solid transparent;background:#f8f9fb;cursor:pointer;transition:all .12s;padding:0}
.proc-btn:hover{background:#e9ecf3}
.proc-btn.active{border-width:2px;font-weight:600}
.proc-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
/* Mode switch */
.mode-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.mode-A{background:#fff3cd;color:#856404;border:1px solid #ffc107}
.mode-P{background:#d1ecf1;color:#0c5460;border:1px solid #17a2b8}
/* Multi select btn */
.btn-multiple{min-width:150px}
/* Treatment table */
.treatment-table{width:100%;border-collapse:collapse;font-size:12px}
.treatment-table th{background:#f8f9fb;padding:6px 8px;border:1px solid #e8ecf0;text-align:left;font-weight:600;color:#555}
.treatment-table td{padding:5px 8px;border:1px solid #e8ecf0;vertical-align:middle}
.treatment-table tr:hover td{background:#f4f7fc}
.teeth-plain{height:52px;width:auto;cursor:help;transition:transform .1s}
.teeth-plain:hover{transform:scale(1.5)}
/* Status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-active{background:#d4edda;color:#155724}
.badge-passive{background:#fff3cd;color:#856404}
/* Legend */
.legend-bar{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px;background:#f8f9fb;border-top:1px solid #e0e4ea;border-radius:0 0 10px 10px}
.leg-item{display:flex;align-items:center;cursor:default}
.leg-dot{width:12px;height:12px;border-radius:50%}
/* Empty state */
.empty-state{padding:30px;text-align:center;color:#aab0bc;font-size:13px}
/* Info row */
.info-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:6px 16px;background:#e8f4f8;border-bottom:1px solid #d0e8f0;font-size:12px;color:#2c7a8c}
@media(max-width:768px){
  .teeth-single-wrapper{min-width:30px;max-width:30px}
  .teeth-def{height:50px}
}
@media(max-width:480px){
  .teeth-single-wrapper{min-width:20px;max-width:20px}
  .teeth-def{height:32px;padding:1px}
  .teeth-top{width:20px;padding:1px}
}
</style>
</head>
<body>
<div class="editor-wrap">

  <div class="card">
    <div class="card-header">
      <div class="btn-group">
        <button class="btn btn-default" onclick="setMode('A')" id="btnModeA">Anamnez</button>
        <button class="btn btn-default" onclick="setMode('P')" id="btnModeP">Tedavi Planı</button>
      </div>
      <span id="modeBadge" class="mode-badge mode-P">MOD: TEDAVİ PLANI</span>
      <div class="btn-group">
        <button id="treatmentMultipleButton" onclick="toggleMultiple()" class="btn btn-default btn-multiple">
          ✕ Çoklu Seçim: Kapalı
        </button>
        <button id="treatmentMultipleDoneButton" onclick="openEditor()" class="btn btn-outline-success" style="display:none">✓ Tamam</button>
        <button id="treatmentRemoveSelectButton" onclick="removeAll()" class="btn btn-danger btn-sm" style="display:none"></button>
      </div>
    </div>

    <!-- Procedure selector -->
    <div class="info-row">
      <div class="proc-toolbar" id="procToolbar"></div>
    </div>

    <div class="card-body" id="schemeContainer">
      <div id="toothScheme"></div>
    </div>

    <div class="legend-bar" id="legendBar"></div>
  </div>

  <!-- Treatment table card -->
  <div class="card" id="planTableCard">
    <div class="card-header">
      <span style="font-weight:600;font-size:13px">Tedavi Planı Listesi</span>
      <button class="btn btn-sm btn-default" onclick="clearAll()">Tümünü Temizle</button>
    </div>
    <div class="card-body" style="padding:0">
      <div id="treatmentPlanTable"><div class="empty-state">Henüz tedavi planı eklenmedi. Dişlere tıklayarak başlayın.</div></div>
    </div>
  </div>
</div>

<!-- Simple modal -->
<div id="editorModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:460px;max-width:95vw;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
    <h4 style="margin-bottom:14px;font-size:15px">Tedavi Ekle / Düzenle</h4>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:3px" id="lblSelectedTeeth">Seçili Dişler</label>
      <div id="modalTeethImgs" style="display:flex;gap:4px;flex-wrap:wrap;padding:6px;border:1px solid #e0e4ea;border-radius:6px;min-height:40px"></div>
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:3px">Tedavi Türü</label>
      <select id="modalProc" style="width:100%;padding:6px 8px;border:1px solid #d0d5e0;border-radius:6px;font-size:13px">
      </select>
    </div>
<div id="modalAreas" style="display:none"></div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:3px">Not</label>
      <textarea id="modalNote" rows="2" style="width:100%;padding:6px 8px;border:1px solid #d0d5e0;border-radius:6px;font-size:13px;resize:none"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeModal()" class="btn btn-default">Kapat</button>
      <button onclick="savePlan()" class="btn btn-success">💾 Kaydet</button>
    </div>
  </div>
</div>

const AREA_CODES = {O:'Occlusal',B:'Buccal',P:'Palatinal',M:'Mesial',D:'Distal',V:'Vestibul',L:'Lingual',S:'Singulum'};

const ADULT_ALLOWED  = [11,12,13,14,15,16,17,18,21,22,23,24,25,26,27,28,31,32,33,34,35,36,37,38,41,42,43,44,45,46,47,48];
const CHILD_ALLOWED  = [51,52,53,54,55,61,62,63,64,65,71,72,73,74,75,81,82,83,84,85];
const ALL_ALLOWED    = [...ADULT_ALLOWED,...CHILD_ALLOWED];

function toothLocation(n){
  return ([...range(11,18),...range(21,28),...range(51,55),...range(61,65)].includes(n)) ? 'T' : 'B';
}
function toothPosition(n){
  return ([...range(11,18),...range(51,55),...range(41,48),...range(81,85)].includes(n)) ? 'R' : 'L';
}
function toothType(n){
  const front=[11,12,13,21,22,23,51,52,53,61,62,63,81,82,83,71,72,73,41,42,43,31,32,33];
  return front.includes(n)?'A4':'A5';
}
function toothName(n){
  const names={
    1:'Santral Kesici',2:'Lateral Kesici',3:'Kanin',
    4:'1.Premolar',5:'2.Premolar',
    6:'1.Molar',7:'2.Molar',8:'3.Molar'
  };
  return names[n%10]||'Diş';
}
function toothBaseAreas(n){
  const loc=toothLocation(n), type=toothType(n), pos=toothPosition(n);
  const A=loc+type;
  if(A==='TA5') return 'OPVMD';
  if(A==='BA5') return 'OLDMB';
  if(A==='TA4'||A==='BA4') return 'BDMS';
  return '';
}
// Compute tops filename exactly as PHP does
function toothTopKey(n, selectedAreas){
  const loc=toothLocation(n), type=toothType(n), pos=toothPosition(n);
  const A=loc+type;
  const D=selectedAreas.split('');
  const CA=(v)=>D.includes(v)?'1':'0';
  let F='';
  if(A==='TA5') F=CA('O')+CA('P')+CA(pos==='R'?'M':'D')+CA('V')+CA(pos==='R'?'D':'M');
  if(A==='BA5') F=CA('O')+CA('L')+CA(pos==='R'?'D':'M')+CA('B')+CA(pos==='R'?'M':'D');
  if(A==='TA4') F=CA('B')+CA(pos==='R'?'D':'M')+CA('S')+CA(pos==='R'?'M':'D');
  if(A==='BA4') F=CA('B')+CA(pos==='R'?'M':'D')+CA('S')+CA(pos==='R'?'D':'M');
  return {key:F, sub:A};
}
function range(a,b){const r=[];for(let i=a;i<=b;i++)r.push(i);return r;}

// =============================================
// STATE
// =============================================
const PROCS=[
  {id:'caries',  label:'Çürük',          c:'#c0392b'},
  {id:'filling', label:'Dolgu',           c:'#2980b9'},
  {id:'crown',   label:'Kron',            c:'#d4a017'},
  {id:'endo',    label:'Kanal Tedavisi',  c:'#8e44ad'},
  {id:'extract', label:'Çekim',           c:'#7f8c8d'},
  {id:'implant', label:'İmplant',         c:'#16a085'},
  {id:'bridge',  label:'Köprü',           c:'#e67e22'},
  {id:'missing', label:'Eksik Diş',       c:'#bdc3c7'},
  {id:'obs',     label:'Gözlem',          c:'#3498db'},
];

let mode='P';         // A=Anamnez, P=Plan
let multiple=false;
let selected={};      // {toothNum: originalImgSrc} - selected in multi mode
let plans=[];         // [{id, teeth:[{num,areas}], proc, note, date}]
let selProc='caries';

// =============================================
// TOOTH SCHEME RENDER (PHP _treatmentCreateEditor logic)
// =============================================
const UPPER_ADULT=[18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28];
const UPPER_CHILD=[55,54,53,52,51,61,62,63,64,65];
const LOWER_CHILD=[85,84,83,82,81,71,72,73,74,75];
const LOWER_ADULT=[48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];

function getToothSrc(n, isProcessed){
  const k=String(n);
  if(isProcessed && IMGS.p[k]) return IMGS.p[k];
  return IMGS.n[k]||'';
}
function getTopSrc(n, areas){
  const {key,sub}=toothTopKey(n,areas);
  return (IMGS.tops[sub]&&IMGS.tops[sub][key])||'';
}
function isProcessed(n){ return plans.some(p=>p.teeth.some(t=>t.num===n)); }
function getProcessedAreas(n){
  for(const p of plans){
    const t=p.teeth.find(x=>x.num===n);
    if(t) return t.areas;
  }
  return '';
}

function renderTooth(n){
  const isTop=toothLocation(n)==='T';
  const proc=isProcessed(n);
  const areas=getProcessedAreas(n);
  const numStr=String(n);
  const numEl=`<div class="tooth-num">${n}</div>`;
  const src=proc?IMGS.p[numStr]:IMGS.n[numStr];
  const topSrc=getTopSrc(n,areas);
  const plan=plans.find(p=>p.teeth.some(t=>t.num===n));
  const procColor=plan?(PROCS.find(pr=>pr.id===plan.proc)?.c||null):null;
  const border=procColor?`style="outline:2px solid ${procColor};border-radius:4px;"`:'';
  const imgEl=`<div class="teeth-def" ${border} onclick="clickTooth(${n})" title="${toothName(n)} (${n})"><img src="${src||''}" id="tooth-img-${n}" height="100%"></div>`;
  const topEl=`<div class="teeth-top"><img src="${topSrc||''}" width="100%"></div>`;
  return `<div class="teeth-single-wrapper">${isTop?numEl+imgEl+topEl:topEl+imgEl+numEl}</div>`;
}

function renderScheme(){
  const rows=[
    {cls:'teeth-roots teeth-roots-top',nums:UPPER_ADULT},
    {cls:'teeth-roots teeth-roots-top child-row',nums:UPPER_CHILD},
    {cls:'teeth-roots teeth-roots-bottom child-row',nums:LOWER_CHILD},
    {cls:'teeth-roots teeth-roots-bottom',nums:LOWER_ADULT},
  ];
  document.getElementById('toothScheme').innerHTML=rows.map(r=>
    `<div class="${r.cls}">${r.nums.map(n=>renderTooth(n)).join('')}</div>`
  ).join('');
}

// =============================================
// SELECTION
// =============================================
function clickTooth(n){
  if(!ALL_ALLOWED.includes(n)) return;
  const img=document.getElementById('tooth-img-'+n);
  if(multiple){
    if(selected.hasOwnProperty(n)){
      // deselect
      img.src=isProcessed(n)?IMGS.p[String(n)]:IMGS.n[String(n)];
      delete selected[n];
    } else {
      selected[n]=img.src;
      img.src=IMGS.s[String(n)]||img.src;
    }
    updateSelectButtons();
  } else {
    removeAll();
    selected[n]=img.src;
    img.src=IMGS.s[String(n)]||img.src;
    openEditor();
  }
}

function removeAll(){
  for(const n in selected){
    const img=document.getElementById('tooth-img-'+n);
    if(img) img.src=isProcessed(n)?IMGS.p[String(n)]:IMGS.n[String(n)];
  }
  selected={};
  updateSelectButtons();
}

function updateSelectButtons(){
  const cnt=Object.keys(selected).length;
  const rBtn=document.getElementById('treatmentRemoveSelectButton');
  const dBtn=document.getElementById('treatmentMultipleDoneButton');
  if(cnt>0){
    rBtn.style.display='inline-flex';
    dBtn.style.display='inline-flex';
    rBtn.textContent=`🗑 Temizle (${cnt})`;
  } else {
    rBtn.style.display='none';
    dBtn.style.display='none';
  }
}

function toggleMultiple(){
  multiple=!multiple;
  removeAll();
  const btn=document.getElementById('treatmentMultipleButton');
  const sdBtn=document.getElementById('treatmentMultipleSelectorButton');
  if(multiple){
    btn.className='btn btn-success btn-multiple';
    btn.innerHTML='✓ Çoklu Seçim: Açık';
  } else {
    btn.className='btn btn-default btn-multiple';
    btn.innerHTML='✕ Çoklu Seçim: Kapalı';
  }
}

// =============================================
// MODAL EDITOR
// =============================================
function openEditor(){
  const nums=Object.keys(selected).map(Number);
  if(!nums.length) return;
  // fill proc select
  const ps=document.getElementById('modalProc');
  ps.innerHTML=PROCS.map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
  ps.value=selProc;
  // show selected teeth images
  const mi=document.getElementById('modalTeethImgs');
  mi.innerHTML=nums.map(n=>`<img src="${IMGS.p[String(n)]||IMGS.n[String(n)]||''}" class="teeth-plain" title="${toothName(n)} (${n})" style="height:44px">`).join('');
  // label
  const lbl=document.getElementById('lblSelectedTeeth');
  lbl.textContent=nums.length>1?`Seçili Dişler: ${nums.join(', ')}`:`Diş ${nums[0]} - ${toothName(nums[0])}`;
  // areas - only show if single tooth
  buildAreaSelect(nums.length===1?nums[0]:null);
  document.getElementById('modalNote').value='';
  document.getElementById('editorModal').style.display='flex';
}

function buildAreaSelect(toothNum){
  const div=document.getElementById('modalAreas');
  if(!toothNum){div.innerHTML='<span style="color:#aaa;font-size:11px">Çoklu seçimde yüzey seçimi yapılamaz</span>';return;}
  const base=toothBaseAreas(toothNum);
  div.innerHTML=base.split('').map(a=>`
    <label style="display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-size:12px;padding:3px 8px;border:1px solid #d0d5e0;border-radius:4px">
      <input type="checkbox" value="${a}" class="area-cb"> ${AREA_CODES[a]||a}
    </label>`).join('');
}

function closeModal(){
  document.getElementById('editorModal').style.display='none';
  removeAll();
}

function savePlan(){
  const nums=Object.keys(selected).map(Number);
  if(!nums.length) return;
  const proc=document.getElementById('modalProc').value;
  const note=document.getElementById('modalNote').value;
  const areaChecks=document.querySelectorAll('.area-cb:checked');
  const areas=Array.from(areaChecks).map(c=>c.value).join('');
  selProc=proc;
  // Add plan entry
  const id=Date.now();
  plans.push({id, teeth:nums.map(n=>({num:n,areas})), proc, note, date:new Date().toLocaleDateString('tr-TR')});
  closeModal();
  renderScheme();
  renderPlanTable();
}

// =============================================
// PLAN TABLE
// =============================================
function renderPlanTable(){
  const div=document.getElementById('treatmentPlanTable');
  if(!plans.length){
    div.innerHTML='<div class="empty-state">Henüz tedavi planı eklenmedi. Dişlere tıklayarak başlayın.</div>';
    return;
  }
  let html=`<table class="treatment-table">
    <thead><tr>
      <th>#</th><th>Diş</th><th>Yüzey</th><th>Tedavi</th><th>Not</th><th>Tarih</th><th>İşlemler</th>
    </tr></thead><tbody>`;
  plans.forEach((plan,i)=>{
    const procDef=PROCS.find(p=>p.id===plan.proc)||{label:plan.proc,c:'#888'};
    const teethImgs=plan.teeth.map(t=>{
      const areas_names=t.areas?t.areas.split('').map(a=>AREA_CODES[a]||a).join(','):'';
      return `<img src="${IMGS.p[String(t.num)]||IMGS.n[String(t.num)]||''}" class="teeth-plain" title="${toothName(t.num)} (${t.num})${areas_names?' — '+areas_names:''}">`;
    }).join('');
    const areaNames=plan.teeth.map(t=>t.areas?t.areas.split('').map(a=>AREA_CODES[a]||a).join(','):'').filter(Boolean).join('; ');
    html+=`<tr>
      <td style="text-align:center">${i+1}</td>
      <td>${teethImgs}</td>
      <td style="font-size:11px;color:#666">${areaNames||'—'}</td>
      <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:50%;background:${procDef.c};display:inline-block"></span>${procDef.label}</span></td>
      <td style="font-size:11px;color:#555;max-width:120px">${plan.note||'—'}</td>
      <td style="font-size:11px;color:#888">${plan.date}</td>
      <td style="text-align:center">
        <button onclick="deletePlan(${plan.id})" class="btn btn-sm btn-danger" title="Sil">🗑</button>
      </td>
    </tr>`;
  });
  html+='</tbody></table>';
  div.innerHTML=html;
}

function deletePlan(id){
  plans=plans.filter(p=>p.id!==id);
  renderScheme();
  renderPlanTable();
}

function clearAll(){
  if(!plans.length) return;
  if(confirm('Tüm tedavi planları silinecek. Emin misiniz?')){
    plans=[];
    renderScheme();
    renderPlanTable();
  }
}

// =============================================
// MODE
// =============================================
function setMode(m){
  mode=m;
  document.getElementById('btnModeA').className='btn '+(m==='A'?'btn-success':'btn-default');
  document.getElementById('btnModeP').className='btn '+(m==='P'?'btn-success':'btn-default');
  document.getElementById('modeBadge').className='mode-badge '+(m==='A'?'mode-A':'mode-P');
  document.getElementById('modeBadge').textContent='MOD: '+(m==='A'?'ANAMNEZ':'TEDAVİ PLANI');
}

// =============================================
// PROC TOOLBAR
// =============================================
function buildToolbar(){
  const tb=document.getElementById('procToolbar');
  PROCS.forEach(p=>{
    const b=document.createElement('button');
    b.className='proc-btn'+(p.id===selProc?' active':'');
    b.id='pb-'+p.id;
    b.title=p.label;
    if(p.id===selProc){b.style.borderColor=p.c;b.style.borderWidth='2px';}
    b.innerHTML=`<span class="proc-dot" style="background:${p.c}"></span>`;
    b.onclick=()=>{
      selProc=p.id;
      document.querySelectorAll('.proc-btn').forEach(x=>{x.classList.remove('active');x.style.borderColor='';x.style.borderWidth='';});
      b.classList.add('active');b.style.borderColor=p.c;b.style.borderWidth='2px';
    };
    tb.appendChild(b);
  });
}

// =============================================
// LEGEND
// =============================================
function buildLegend(){
  const leg=document.getElementById('legendBar');
  leg.innerHTML=PROCS.map(p=>`<div class="leg-item" title="${p.label}"><span class="leg-dot" style="background:${p.c}"></span></div>`).join('');
}

// =============================================
// INIT
// =============================================
buildToolbar();
buildLegend();
setMode('P');
renderScheme();
renderPlanTable();
</script>
</body>
</html>
