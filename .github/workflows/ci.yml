name: Pulpax CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        project: 
          - backend-saas
          - backend-clinic
          - frontend-saas
          - frontend-clinic

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install Dependencies
      run: |
        cd ${{ matrix.project }}
        npm ci

    - name: Run Lint
      # continue-on-error: lint was just introduced across a codebase with pre-existing
      # violations (uncommitted debt). Flip to blocking once that debt is paid down.
      continue-on-error: true
      run: |
        cd ${{ matrix.project }}
        npm run lint --if-present

    - name: Run Build
      run: |
        cd ${{ matrix.project }}
        npm run build --if-present

    - name: Run Tests
      run: |
        cd ${{ matrix.project }}
        npm test --if-present

    - name: Security Audit
      run: |
        cd ${{ matrix.project }}
        npm audit --audit-level=high
